<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bratty Brooke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1a2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .profile {
            margin-bottom: 40px;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #d41159;
            margin: 0 auto 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            background-size: cover;
            background-position: center;
        }

        .profile h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile p {
            color: #d41159;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            padding: 16px 24px;
            background: linear-gradient(135deg, #d41159, #b00d47);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .link-btn:hover {
            background: linear-gradient(135deg, #b00d47, #8b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 17, 89, 0.4);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .link-btn.secondary {
            background: rgba(212, 17, 89, 0.1);
            color: #d41159;
            border: 2px solid #d41159;
        }

        .link-btn.secondary:hover {
            background: rgba(212, 17, 89, 0.2);
            box-shadow: 0 8px 24px rgba(212, 17, 89, 0.2);
        }

        .dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: rgba(26, 26, 26, 0.95);
            min-width: 100%;
            box-shadow: 0 8px 24px rgba(212, 17, 89, 0.3);
            padding: 12px 0;
            z-index: 1;
            border-radius: 8px;
            border: 2px solid #d41159;
            top: 100%;
            margin-top: 4px;
        }

        .dropdown-content.show {
            display: block;
        }

        .crypto-option {
            color: #d41159;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(212, 17, 89, 0.2);
        }

        .crypto-option:last-child {
            border-bottom: none;
        }

        .crypto-option:hover {
            background-color: rgba(212, 17, 89, 0.15);
        }

        .crypto-address {
            font-family: monospace;
            font-size: 12px;
            color: #fff;
            margin-right: 8px;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #d41159;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: rgba(212, 17, 89, 0.2);
        }

        @media (max-width: 480px) {
            .profile h1 {
                font-size: 28px;
            }

            .link-btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <div class="profile-img" style="background-image: url('pfp.jpg');"></div>
            <h1>Bratty Brooke</h1>
            <p>Exclusive Content</p>
        </div>

        <div class="links">
            <a href="https://throne.com/brattybbrooke" class="link-btn">Throne</a>
            <a href="https://sent.bio/brattybrooke" class="link-btn secondary">sent.bio</a>
            
            <div class="dropdown">
                <button class="link-btn" id="cryptoBtn">Crypto</button>
                <div class="dropdown-content" id="cryptoDropdown">
                    <div class="crypto-option" onclick="copyAddress('5CXkhpd1v2A7qxi1S7augNzSUdqzYH9RDfhXq9T5RXRW')">
                        <span class="crypto-address">SOL: 5Cxkh...</span>
                        <button class="copy-btn">copy</button>
                    </div>
                    <div class="crypto-option" onclick="copyAddress('bc1qwur8t4ha8tmz8zl2naawk3kjkh40hs93afsesy')">
                        <span class="crypto-address">BTC: bc1qwu...</span>
                        <button class="copy-btn">copy</button>
                    </div>
                    <div class="crypto-option" onclick="copyAddress('0xde1Ecd6b162c0b20DE2Adc421a12c6363027dD4F')">
                        <span class="crypto-address">ETH: 0xde1E...</span>
                        <button class="copy-btn">copy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cryptoBtn = document.getElementById('cryptoBtn');
        const cryptoDropdown = document.getElementById('cryptoDropdown');

        cryptoBtn.addEventListener('click', function(e) {
            e.preventDefault();
            cryptoDropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                cryptoDropdown.classList.remove('show');
            }
        });

        function copyAddress(address) {
            navigator.clipboard.writeText(address).then(function() {
                alert('✓ Copied: ' + address.substring(0, 10) + '...');
            }).catch(function(err) {
                alert('Failed to copy');
            });
        }
    </script>
</body>
</html>
